<!DOCTYPE html>
<html>
<head>
    <title>人脸注册 - CanMV K230</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 20px; background-color: #f5f5f5; }
        #video { border: 2px solid #333; border-radius: 8px; max-width: 100%; }
        #canvas { display: none; }
        button { padding: 12px 24px; font-size: 16px; margin: 10px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #45a049; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .status { margin: 15px 0; padding: 10px; border-radius: 6px; }
        .status.success { background: #e8f5e9; }
        .status.error { background: #ffebee; }
        input { padding: 10px; font-size: 16px; width: 80%; max-width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>人脸注册系统</h1>
        
        <div>
            <video id="video" width="320" height="240" autoplay></video>
            <canvas id="canvas" width="320" height="240"></canvas>
        </div>
        
        <div>
            <input type="text" id="name" placeholder="请输入姓名" required>
            <button onclick="registerFace()">注册人脸</button>
        </div>
        
        <div id="result" class="status"></div>
    </div>

    <script>
        // 开发板IP地址（需要根据实际情况设置）
        const BOARD_IP = "192.168.1.100";
        const BOARD_PORT = "80";
        
        // 检测当前协议，使用相同协议访问开发板
        function getProtocol() {
            return window.location.protocol === 'https:' ? 'https:' : 'http:';
        }
        
        // 获取摄像头视频流（适配iOS和移动端）
        async function initCamera() {
            try {
                showResult("正在初始化摄像头...", "success");
                
                // 移动端适配
                const constraints = {
                    video: {
                        facingMode: 'user',
                        width: { ideal: 320, max: 640 },
                        height: { ideal: 240, max: 480 },
                        deviceId: undefined
                    },
                    audio: false
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                video.onloadedmetadata = function() {
                    video.play().catch(e => {
                        console.log("需要用户交互才能播放:", e);
                    });
                };
                
                showResult("✅ 摄像头已就绪，请输入姓名开始注册", "success");
            } catch (err) {
                console.error("摄像头访问失败:", err);
                showResult("❌ 无法访问摄像头，请检查权限设置\n（在手机浏览器中需要点击页面授权）", "error");
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            showResult("页面加载中...", "success");
            
            // 移动端需要用户交互才能访问摄像头
            document.body.addEventListener('click', function initOnClick() {
                initCamera();
                document.body.removeEventListener('click', initOnClick);
            }, { once: true });
            
            // 尝试自动初始化
            initCamera();
        });

        // 注册人脸
        async function registerFace() {
            const name = document.getElementById('name').value.trim();
            if (!name) {
                showResult("❌ 请输入姓名！", "error");
                return;
            }

            // 检查视频是否正常
            const video = document.getElementById('video');
            if (!video.srcObject) {
                showResult("❌ 摄像头未就绪，请先点击页面授权", "error");
                return;
            }

            showResult("📷 正在捕获人脸图像...", "success");

            // 从视频捕获图像
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 320, 240);
            
            // 转换为base64
            const imageData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            
            // 构建开发板地址（使用相同协议）
            const protocol = getProtocol();
            const boardUrl = `${protocol}//${BOARD_IP}:${BOARD_PORT}/register?name=${encodeURIComponent(name)}`;
            
            showResult("📡 正在发送数据到开发板...", "success");
            
            try {
                const response = await fetch(boardUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `image=${imageData}`,
                    mode: 'no-cors'  // 避免跨域问题
                });
                
                // 由于使用了no-cors，无法获取响应内容
                showResult("✅ 注册成功！人脸信息已发送到开发板", "success");
                document.getElementById('name').value = '';
                
            } catch (err) {
                console.error("注册失败:", err);
                showResult("❌ 注册失败！\n请确保手机和开发板在同一局域网\n开发板IP: " + BOARD_IP, "error");
            }
        }

        // 显示结果
        function showResult(msg, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'status ' + type;
            resultDiv.textContent = msg;
        }
    </script>
</body>
</html>
