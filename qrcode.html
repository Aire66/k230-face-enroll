<!DOCTYPE html>
<html>
<head>
    <title>扫码注册 - 人脸注册系统</title>
    <meta charset="utf-8">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 50px auto;
            max-width: 400px;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .qrcode-container {
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            font-size: 24px;
        }
        .hint {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        #qrcode img {
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 20px 0;
        }
        .url-display {
            font-size: 12px;
            color: #888;
            word-break: break-all;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="qrcode-container">
        <h1>人脸注册</h1>
        <p style="color: #888; font-size: 16px;">使用手机扫码进入注册页面</p>
        <div style="padding: 15px; background: #e8f5e9; border-radius: 6px; margin-bottom: 15px;">
            <p style="color: #2e7d32; font-weight: bold;">✅ 网站已部署成功！</p>
            <p style="color: #555; font-size: 14px; margin-top: 5px;">公网地址：<br><span id="domainDisplay">加载中...</span></p>
        </div>
        <div id="qrcode"></div>
        <div class="url-display" id="urlDisplay"></div>
        <p class="hint">确保手机和电脑连接到同一个WiFi</p>
    </div>

    <script>
        // 自动获取当前网站地址
        const currentDomain = window.location.origin;
        const registerUrl = currentDomain + '/index.html';
        
        function generateQR() {
            // 显示域名
            document.getElementById('domainDisplay').textContent = currentDomain;
            
            // 显示注册地址
            document.getElementById('urlDisplay').innerHTML = '<span style="color: green; font-weight: bold;">✅ 注册地址：</span><br>' + registerUrl;
            
            // 生成二维码
            const encodedUrl = encodeURIComponent(registerUrl);
            const qrSize = 250;
            const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=' + qrSize + 'x' + qrSize + '&data=' + encodedUrl;
            
            const img = document.createElement('img');
            img.src = qrUrl;
            img.alt = '人脸注册二维码';
            
            img.onerror = function() {
                document.getElementById('qrcode').innerHTML = '<div style="padding: 20px; background: #f9f9f9; border-radius: 8px;"><p style="color: #666;">二维码加载失败，请手动访问：</p><p style="font-size: 12px; word-break: break-all; color: #333;">' + registerUrl + '</p></div>';
            };
            
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('qrcode').appendChild(img);
        }
        
        // 页面加载时自动生成二维码
        document.addEventListener('DOMContentLoaded', function() {
            generateQR();
        });
    </script>
</body>
</html>
